name: Build & Deploy to Docker

on:
  push:
    branches: [main]
  release:
    types: [published]

jobs:
  build-backend:
    name: Build Backend Image
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
        
      - name: Build Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: dakshtra-backend:latest
          
  build-frontend:
    name: Build Frontend Image
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
        
      - name: Build Docker image
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          tags: dakshtra-frontend:latest
          build-args: |
            VITE_API_BASE_URL=http://localhost:8000

  compose-validation:
    name: Validate Docker Compose
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Validate docker-compose.yml
        run: |
          docker-compose config > /dev/null && echo "✓ docker-compose.yml is valid"
          
      - name: Check service definitions
        run: |
          docker-compose config --services | grep -E "backend|frontend" && echo "✓ All services configured"

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: dakshtra_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run integration tests
        env:
          DATABASE_URL: postgresql://postgres:testpass@localhost:5432/dakshtra_test
        run: |
          python -m pytest backend/tests -v --tb=short -k "integration" || true

  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'
          
      - name: Install quality tools
        run: |
          python -m pip install --upgrade pip
          pip install requirements-txt
          pip install flake8 black pylint
          
      - name: Check code formatting with black
        run: black --check backend/ || true
        continue-on-error: true
        
      - name: Lint with flake8
        run: |
          flake8 backend/ --max-line-length=120 --extend-ignore=E203,W503 || true
        continue-on-error: true

  notify:
    name: Notify on Completion
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend, compose-validation]
    if: always()
    
    steps:
      - name: Check build status
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Build pipeline completed successfully!"
          else
            echo "⚠️ Build pipeline completed with warnings or failures"
          fi
