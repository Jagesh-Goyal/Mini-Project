name: Test & Validate

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'
      
      - name: Install Snyk CLI
        uses: snyk/actions/setup@master
        continue-on-error: true
      
      - name: Run Snyk security scan
        run: snyk test --severity-threshold=high || true
        continue-on-error: true
          
      - name: Cache Python dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
            
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Lint with pylint (optional)
        continue-on-error: true
        run: |
          pip install pylint
          pylint backend/ --exit-zero || true
          
      - name: Run pytest
        run: |
          python -m pytest backend/tests -v --tb=short --cov=backend --cov-report=xml || true
          
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        continue-on-error: true
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella

  frontend-test:
    name: Frontend Tests & Build
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'
          
      - name: Install dependencies
        run: cd frontend && npm install
        
      - name: Lint
        run: cd frontend && npm run lint || true
        
      - name: Run tests
        run: cd frontend && npm run test || true
        
      - name: Build
        run: cd frontend && npm run build
        
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Install Snyk CLI
        uses: snyk/actions/setup@master
        continue-on-error: true

      - name: Run Snyk security scan (optional)
        continue-on-error: true
        run: |
          if [ -z "${SNYK_TOKEN:-}" ]; then
            echo "SNYK_TOKEN not set; skipping Snyk scan"
            exit 0
          fi
          snyk test --severity-threshold=high

  documentation:
    name: API Documentation
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Verify API docs
        run: |
          python -c "
          import sys
          sys.path.insert(0, '.')
          from backend.app import app
          if hasattr(app, 'openapi'):
              schema = app.openapi()
              print(f'✓ OpenAPI schema available with {len(schema.get(\"paths\", {}))} endpoints')
          else:
              print('✗ OpenAPI schema not available')
          " || true
