services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dakshtra-backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-sqlite:////data/dakshtra.db}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-replace-with-strong-secret}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      ENFORCE_CSRF: ${ENFORCE_CSRF:-true}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:8080,http://localhost:5173,http://127.0.0.1:5173}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      JOB_POSTING_API_URL: ${JOB_POSTING_API_URL:-}
      JOB_POSTING_API_KEY: ${JOB_POSTING_API_KEY:-}
      DEFAULT_ADMIN_EMAIL: ${DEFAULT_ADMIN_EMAIL:-admin@dakshtra.com}
      DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD:-change-admin-password}
      DEFAULT_HR_EMAIL: ${DEFAULT_HR_EMAIL:-hr@dakshtra.com}
      DEFAULT_HR_PASSWORD: ${DEFAULT_HR_PASSWORD:-change-hr-password}
      DEFAULT_EMPLOYEE_EMAIL: ${DEFAULT_EMPLOYEE_EMAIL:-employee@dakshtra.com}
      DEFAULT_EMPLOYEE_PASSWORD: ${DEFAULT_EMPLOYEE_PASSWORD:-change-employee-password}
    volumes:
      - dakshtra_data:/data

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    container_name: dakshtra-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  dakshtra_data:
